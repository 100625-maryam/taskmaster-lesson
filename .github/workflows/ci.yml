name: ci

on: 
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Set up python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: install_file_requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run_tests
        run: |
          pytest tests/
          

